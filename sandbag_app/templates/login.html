<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Sandbag</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { margin-top: 0; color: #333; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🥊 Sandbag Login</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <a href="{% url 'signup' %}" style="display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 0.9rem;">Don't have an account? Sign Up</a>
    </div>

</body>
</html>
