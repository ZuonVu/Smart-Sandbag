<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Smart Sandbag</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { margin-top: 0; color: #333; }
        .helptext { font-size: 0.8rem; color: #666; display: block; margin-bottom: 10px; text-align: left; }
        ul.errorlist { color: #dc3545; font-size: 0.85rem; text-align: left; padding-left: 20px; }
        input { width: 90%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        label { text-align: left; display: block; font-weight: bold; font-size: 0.9rem; color: #333; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 15px; }
        button:hover { background-color: #218838; }
        .link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🥊 Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            
            <div style="text-align: left;">
                {{ form.as_p }}
            </div>
            
            <button type="submit">Sign Up</button>
        </form>
        <a href="{% url 'login' %}" class="link">Already have an account? Log In</a>
    </div>

</body>
</html>
